<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Shop Login Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="login-view" class="login-view">
        <div class="login-panel">
          <p class="eyebrow">CI/CD Practice App</p>
          <h1>Simple Shop</h1>
          <p class="lead">Sign in with the fixed demo account, add products to your cart, and place a mock order.</p>

          <form id="login-form" class="login-form">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" placeholder="demo" required />

            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="password123" required />

            <p id="login-error" class="form-error" aria-live="polite"></p>
            <button type="submit">Login</button>
          </form>

          <div class="credentials">
            <span>Fixed account</span>
            <strong>demo / password123</strong>
          </div>
        </div>
      </section>

      <section id="shop-view" class="shop-view hidden">
        <header class="topbar">
          <div>
            <p class="eyebrow">Welcome back</p>
            <h1>Simple Shop</h1>
          </div>
          <button id="logout-button" class="ghost-button" type="button">Logout</button>
        </header>

        <div class="shop-layout">
          <section>
            <div class="section-heading">
              <h2>Products</h2>
              <span id="product-count"></span>
            </div>
            <div id="product-list" class="product-grid"></div>
          </section>

          <aside class="cart-panel">
            <div class="section-heading">
              <h2>Cart</h2>
              <span id="cart-count">0 items</span>
            </div>
            <div id="cart-items" class="cart-items"></div>
            <div class="cart-summary">
              <span>Total</span>
              <strong id="cart-total">$0.00</strong>
            </div>
            <button id="checkout-button" type="button" disabled>Checkout</button>
            <p id="checkout-message" class="checkout-message" aria-live="polite"></p>
          </aside>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
